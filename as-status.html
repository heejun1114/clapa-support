<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A/S 접수 조회 — CLAPA 고객지원센터</title>
  <meta http-equiv="refresh" content="0; url=as.html#status">
  <link rel="canonical" href="as.html">
</head>
<body>
  <p style="font-family:sans-serif;padding:24px;">잠시만요, <a id="go" href="as.html#status">새 접수 조회 페이지</a>로 이동합니다…</p>
  <script>
    (function () {
      var qs = '';
      try { var id = new URLSearchParams(location.search).get('id'); if (id) qs = '?id=' + encodeURIComponent(id); } catch (e) {}
      var dest = 'as.html' + qs + '#status';
      var a = document.getElementById('go'); if (a) a.href = dest;
      location.replace(dest);
    })();
  </script>
</body>
</html>
