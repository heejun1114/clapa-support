<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계란찜기 레시피북 · CLAPA 고객지원센터</title>
<meta name="description" content="클래파 스테인리스 멀티찜기 계란찜기 레시피북 — 앱 설치나 다운로드 없이 바로 보기.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E6F66'/%3E%3Cpath fill='%23fff' transform='translate(9 16.2) scale(.2864)' d='M72.6 0H88L160.6 110H137.6L80.3 20L22 110H0ZM66.6 86a12.2 12.2 0 1 0 24.4 0 12.2 12.2 0 1 0-24.4 0Z'/%3E%3C/svg%3E">
<style>
  :root{
    --paper:#FAF8F4; --ink:#23201B; --muted:#6F675C;
    --teal:#0E6F66; --teal-deep:#0A5750; --teal-wash:#E4F0ED; --line:#E3DCD1;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--paper); color:var(--ink); letter-spacing:-0.01em;
    -webkit-text-size-adjust:100%;
  }
  a{-webkit-tap-highlight-color:transparent;}
  .rv-bar{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:12px;
    height:56px;padding:0 clamp(12px,4vw,26px);
    background:rgba(250,248,244,.88);
    backdrop-filter:saturate(180%) blur(12px);
    -webkit-backdrop-filter:saturate(180%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  .rv-back{
    display:inline-flex;align-items:center;gap:6px;
    font-size:14px;font-weight:600;color:var(--teal-deep);
    padding:8px 12px 8px 8px;border-radius:9px;text-decoration:none;
    transition:background .15s ease;
  }
  .rv-back:hover{background:var(--teal-wash);}
  .rv-back svg{width:18px;height:18px;flex:none;}
  .rv-title{font-size:15px;font-weight:700;letter-spacing:-0.02em;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rv-count{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:500;white-space:nowrap;}
  .rv-pages{
    max-width:720px;margin:0 auto;
    padding:clamp(14px,3vw,26px) clamp(10px,3vw,20px) 60px;
    display:flex;flex-direction:column;gap:14px;
  }
  .rv-pages img{
    display:block;width:100%;height:auto;
    border-radius:10px;border:1px solid var(--line);background:#fff;
    box-shadow:0 8px 24px -18px rgba(10,87,80,.3);
  }
  .rv-foot{text-align:center;color:var(--muted);font-size:12.5px;padding:10px 0 0;}
  @media (max-width:480px){
    .rv-count{display:none;}
  }
</style>
</head>
<body>
  <header class="rv-bar">
    <a class="rv-back" href="index.html" aria-label="고객지원센터 홈으로 돌아가기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>뒤로</a>
    <span class="rv-title">계란찜기 레시피북</span>
    <span class="rv-count">전 14페이지</span>
  </header>
  <main class="rv-pages">
    <img src="assets/recipes/pages/p01.jpg" alt="계란찜기 레시피북 1페이지" width="1080" height="1528" fetchpriority="high" decoding="async">
    <img src="assets/recipes/pages/p02.jpg" alt="계란찜기 레시피북 2페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p03.jpg" alt="계란찜기 레시피북 3페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p04.jpg" alt="계란찜기 레시피북 4페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p05.jpg" alt="계란찜기 레시피북 5페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p06.jpg" alt="계란찜기 레시피북 6페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p07.jpg" alt="계란찜기 레시피북 7페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p08.jpg" alt="계란찜기 레시피북 8페이지" width="1080" height="1528" loading="lazy" decoding="async">
    <img src="assets/recipes/pages/p09.jpg" alt="계란찜기 레시피북 9페이지" width="1080" height="1528" loading="lazy" decoding="async">

    <p class="rv-foot">계란찜기 레시피북 · 전 14페이지</p>
  </main>
  <script>
  /* '뒤로' — 같은 탭에서 홈에서 들어왔으면 history.back()(모바일 뒤로가기 제스처와 일관),
     외부/직접 진입이면 홈으로 폴백. (href="index.html"는 JS 미동작 시 폴백) */
  (function () {
    var back = document.querySelector('.rv-back');
    if (!back) return;
    back.addEventListener('click', function (e) {
      e.preventDefault();
      var sameOrigin = document.referrer && document.referrer.indexOf(location.origin) === 0;
      if (history.length > 1 && sameOrigin) { history.back(); }
      else { location.href = './'; }
    });
  })();
  </script>
</body>
</html>
