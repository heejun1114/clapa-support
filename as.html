<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A/S 접수·조회 — CLAPA 고객지원센터</title>
<meta name="description" content="클래파 A/S를 3분이면 접수하고, 접수한 기기에서는 입력 없이 진행 상태와 담당자 대화를 바로 확인할 수 있습니다.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E6F66'/%3E%3Cpath d='M42.5 41.5a13 13 0 1 1 0-19' fill='none' stroke='%23fff' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://shop-phinf.pstatic.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* ===== [이식] warranty.html 공통 크롬(토큰·리셋·헤더·히어로·버튼·푸터·FAB) — 값 변형 금지 ===== */
  :root{
    --paper:#FFFFFF;
    --surface:#F5F4F1;
    --sand:#EFE9E1;
    --line:#E6E1D8;
    --line-soft:#EDE9E1;
    --ink:#23201B;
    --muted:#6F675C;
    --sil-d:#AAA294;
    --teal:#0E6F66;
    --teal-deep:#0A5750;
    --teal-wash:#E4F0ED;
    --radius:12px;
    --radius-sm:9px;   /* index.html 폼 토큰 — S2~S5 입력 필드가 재사용 */
    --maxw:1080px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;scroll-padding-top:72px;}
  a,button,summary,.tag,.qm-item,.brand-tab,.qlink,.chat-fab,.part-card,.btn{-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;
    font-size:15px;line-height:1.6;letter-spacing:-0.011em;
    -webkit-font-smoothing:antialiased;word-break:keep-all;
  }
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:clamp(18px,4vw,40px);}
  .skip{position:absolute;left:-9999px;top:0;background:var(--teal);color:#fff;padding:8px 14px;border-radius:8px;z-index:100;}
  .skip:focus{left:12px;top:12px;}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:3px;}

  .site-header{
    position:sticky;top:0;z-index:40;
    background:rgba(255,255,255,.86);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{display:flex;align-items:center;justify-content:space-between;gap:18px;height:60px;}
  .wordmark{display:inline-flex;align-items:baseline;gap:8px;font-weight:700;font-size:16.5px;letter-spacing:-0.02em;}
  .wordmark .mark-a{color:var(--ink);}
  .wordmark .mark-b{
    color:var(--teal);font-weight:600;font-size:13px;letter-spacing:0.06em;
    padding:2px 7px;border:1px solid var(--teal-wash);border-radius:6px;
    background:var(--teal-wash);transform:translateY(-1px);
  }
  .header-nav{display:flex;align-items:center;gap:6px;}
  .nav-link{font-size:13.5px;font-weight:500;color:var(--muted);padding:8px 12px;border-radius:8px;}
  .nav-link:hover{color:var(--ink);background:var(--surface);}
  .nav-link.is-store{color:var(--teal-deep);font-weight:600;}
  .nav-link.is-store .ext{font-size:12px;margin-left:3px;color:var(--teal);}
  @media(max-width:480px){
    .header-inner{gap:10px;min-width:0;}
    .header-nav .nav-link:not(.is-store){display:none;}
    .nav-link.is-store{font-size:12.5px;padding:8px 9px;}
  }

  .page-hero{padding-block:clamp(30px,5vw,52px) clamp(16px,3vw,26px);}
  .eyebrow{display:inline-block;color:var(--teal-deep);font-size:12.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;}
  h1{margin:0;font-size:clamp(24px,3.6vw,32px);line-height:1.2;font-weight:700;letter-spacing:-0.03em;}
  .page-sub{margin:12px 0 0;color:var(--muted);font-size:15px;max-width:56ch;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    min-height:44px;padding:12px 20px;border-radius:10px;
    font-size:14.5px;font-weight:600;letter-spacing:-0.01em;
    border:1.5px solid var(--line);background:var(--paper);color:var(--ink);
    transition:border-color .15s var(--ease),background .15s var(--ease),color .15s var(--ease);
  }
  .btn:hover{border-color:var(--teal);color:var(--teal-deep);background:var(--teal-wash);}
  .btn.is-primary{background:var(--teal);border-color:var(--teal);color:#fff;}
  .btn.is-primary:hover{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff;}

  .site-footer{
    background:#F1EEE8;border-top:1px solid var(--line);
    padding-block:clamp(34px,5vw,52px);margin-top:8px;
  }
  .footer-top{
    display:flex;flex-wrap:wrap;justify-content:space-between;gap:28px 40px;
    padding-bottom:26px;border-bottom:1px solid var(--line);
  }
  .foot-contact .foot-h{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .foot-tel{font-size:22px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:var(--ink);}
  .foot-hours{font-size:13px;color:var(--muted);margin-top:5px;}
  .foot-hours .off{color:var(--sil-d);}
  .foot-brands{display:flex;flex-direction:column;gap:9px;}
  .foot-brands .foot-h{font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
  .foot-brandrow{display:flex;flex-wrap:wrap;gap:8px 10px;}
  .foot-brand{
    display:inline-flex;align-items:baseline;gap:6px;
    font-size:13.5px;font-weight:500;color:var(--ink);
    padding:5px 0;transition:color .14s var(--ease);
  }
  .foot-brand .lat{font-size:11px;color:var(--muted);letter-spacing:0.04em;}
  .foot-brand:hover{color:var(--teal-deep);}
  .foot-brand:hover .lat{color:var(--teal);}
  .footer-legal{
    display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;
    padding-top:22px;color:var(--muted);font-size:12.5px;
  }
  .footer-legal .slogan{color:var(--teal-deep);font-weight:600;letter-spacing:-0.01em;}

  /* ---------- Chat FAB (홈·상세와 동일한 진입점) ---------- */
  .chat-fab{
    position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:50;
    display:inline-flex;align-items:center;gap:10px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:999px;
    padding:11px 17px 11px 14px;
    box-shadow:0 6px 22px -8px rgba(35,32,27,.22),0 2px 6px -3px rgba(35,32,27,.12);
    transition:border-color .16s var(--ease),transform .16s var(--ease);
  }
  .chat-fab:hover{border-color:var(--teal);transform:translateY(-1px);}
  .chat-ic{
    width:32px;height:32px;flex:none;border-radius:50%;
    background:var(--teal-wash);color:var(--teal-deep);
    display:flex;align-items:center;justify-content:center;
  }
  .chat-ic svg{width:17px;height:17px;}
  .chat-tx{display:flex;flex-direction:column;line-height:1.25;text-align:left;}
  .chat-tt{font-size:14px;font-weight:600;letter-spacing:-0.015em;color:var(--ink);}
  .chat-st{font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;}
  .chat-live{width:6px;height:6px;border-radius:50%;background:var(--teal);flex:none;}
  @media(max-width:480px){ .chat-tx{display:none;} .chat-fab{padding:11px;} }

  @media(max-width:640px){
    body{font-size:15.5px;}
    .page-sub{font-size:15px;}
    .footer-legal{font-size:13px;}
  }
  @media(prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;scroll-behavior:auto !important;}
  }

  /* ===== [as.html 고유] 탭 세그먼트·2단 레이아웃·아코디언 카드·점검 카드·토스트 ===== */
  .as-shell{max-width:960px;margin:0 auto;padding-inline:clamp(18px,4vw,40px);padding-bottom:clamp(40px,7vw,72px);}

  /* 탭 세그먼트 — 선택 탭은 teal 채움 */
  .as-tabs{
    display:flex;gap:6px;max-width:420px;
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;
    margin:4px 0 22px;
  }
  .as-tab{
    flex:1;min-height:44px;border:0;background:transparent;border-radius:999px;
    padding:10px 14px;font:inherit;font-size:14.5px;font-weight:650;letter-spacing:-0.01em;
    color:var(--muted);cursor:pointer;
    transition:background .15s var(--ease),color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .as-tab:not([aria-selected="true"]):hover{color:var(--ink);}
  .as-tab[aria-selected="true"]{background:var(--teal);color:#fff;box-shadow:0 1px 5px -1px rgba(14,111,102,.4);}

  /* 접수 탭 2단 — ≥900px에서만 우측 264px sticky 요약·도움 패널 */
  .as-layout{display:block;}
  @media(min-width:900px){
    .as-layout{display:grid;grid-template-columns:1fr 264px;gap:28px;align-items:start;}
  }
  .as-main{min-width:0;}
  .as-aside{position:sticky;top:80px;}
  @media(max-width:899px){ .as-aside{display:none;} }   /* 폰: 요약 패널 숨김(각 섹션이 요약 역할) */

  /* 아코디언 섹션 카드 — 상태(대기/열림/완료)는 S2 엔진이 토글 */
  .sec-card{border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);margin-bottom:14px;}
  .sec-card.is-dim{opacity:.55;}                                                  /* 대기 */
  .sec-card.is-dim .sec-head{cursor:default;}
  .sec-card.is-open{border-color:var(--teal);box-shadow:0 3px 14px -8px rgba(14,111,102,.28);}  /* 열림 */
  .sec-card.is-done .sec-body{display:none;}                                      /* 완료(요약 한 줄만) */
  .sec-head{display:flex;align-items:center;gap:12px;min-height:52px;padding:14px 16px;cursor:pointer;}
  .sec-body{padding:0 16px 16px;}
  .sec-done-line{font-weight:700;color:var(--teal-deep);letter-spacing:-0.015em;}

  /* ---- [S2] 섹션 헤드(번호·제목·변경)·제품 그리드·요약 aside ---- */
  .sec-card.is-open .sec-head{cursor:default;}
  .sec-num{
    flex:none;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;
    background:var(--teal-wash);color:var(--teal-deep);
  }
  .sec-card.is-open .sec-num{background:var(--teal);color:#fff;}
  .sec-head-main{flex:1;min-width:0;display:flex;align-items:center;gap:10px;}
  .sec-title{font-size:16px;font-weight:700;letter-spacing:-0.015em;color:var(--ink);}
  .sec-edit{
    flex:none;min-height:32px;padding:5px 12px;border-radius:999px;
    border:1px solid var(--line);background:var(--paper);color:var(--muted);
    font:inherit;font-size:13px;font-weight:600;cursor:pointer;
    transition:border-color .15s var(--ease),color .15s var(--ease);
  }
  .sec-edit:hover{border-color:var(--teal);color:var(--teal-deep);}

  .prod-help{margin:0 0 14px;color:var(--muted);font-size:15.5px;line-height:1.55;}
  .prod-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .cat-card{
    display:flex;flex-direction:column;gap:2px;align-items:flex-start;
    min-height:58px;padding:11px 13px;
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
    font:inherit;text-align:left;cursor:pointer;
    transition:border-color .15s var(--ease),background .15s var(--ease);
  }
  .cat-card:hover{border-color:var(--teal);background:var(--teal-wash);}
  .cat-card.is-active{border-color:var(--teal);background:var(--teal-wash);}
  .cat-name{font-size:15px;font-weight:650;letter-spacing:-0.015em;color:var(--ink);}
  .cat-card.is-active .cat-name{color:var(--teal-deep);}
  .cat-count{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;}

  .prod-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px;
    margin-top:14px;
  }
  .prod-tile{
    display:flex;flex-direction:column;gap:7px;padding:8px;
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
    font:inherit;text-align:left;cursor:pointer;
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .prod-tile:hover{border-color:var(--teal);box-shadow:0 3px 12px -8px rgba(14,111,102,.3);}
  .prod-thumb{
    aspect-ratio:1/1;width:100%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface);border:1px solid var(--line-soft);border-radius:8px;
  }
  .prod-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .22s var(--ease);}
  .prod-tile:hover .prod-thumb img{transform:scale(1.04);}
  .prod-code{font-size:14px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);font-variant-numeric:tabular-nums;word-break:break-all;}
  .prod-name{font-size:12.5px;line-height:1.4;color:var(--muted);}

  .prod-free{margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft);}
  .prod-free-label{font-size:15.5px;font-weight:600;color:var(--ink);margin-bottom:9px;}
  .prod-free-row{display:flex;gap:8px;flex-wrap:wrap;}
  .prod-free-input{
    flex:1;min-width:0;min-height:44px;padding:11px 14px;
    font-family:inherit;font-size:16px;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .prod-free-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash);}
  .prod-free-go{
    flex:none;min-height:44px;padding:11px 18px;
    border:1.5px solid var(--teal);background:var(--teal);color:#fff;border-radius:var(--radius-sm);
    font:inherit;font-size:14.5px;font-weight:650;cursor:pointer;
    transition:background .15s var(--ease),border-color .15s var(--ease);
  }
  .prod-free-go:hover{background:var(--teal-deep);border-color:var(--teal-deep);}

  .aside-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .aside-title{font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .aside-row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-top:1px solid var(--line-soft);}
  .aside-row:first-of-type{border-top:0;}
  .aside-k{font-size:13px;color:var(--muted);flex:none;}
  .aside-v{font-size:13.5px;font-weight:600;color:var(--ink);text-align:right;word-break:break-all;}
  .aside-safe{margin:12px 0 0;padding-top:12px;border-top:1px solid var(--line-soft);font-size:12.5px;line-height:1.55;color:var(--muted);}

  @media(max-width:520px){
    .prod-cats{grid-template-columns:repeat(2,1fr);}
    .prod-grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr));}
  }

  /* ---------- [S3] 스마트 위층(빠른 시작 — 내 제품·전화 매칭·사진·주문번호) ---------- */
  .up-card{
    background:linear-gradient(180deg,var(--teal-wash),var(--paper) 62%);
    border:1px solid #CFE4DF;border-radius:var(--radius);
    padding:16px 16px 15px;margin-bottom:16px;
  }
  .up-head{margin-bottom:13px;}
  .up-eyebrow{
    display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--teal-deep);margin-bottom:5px;
  }
  .up-title{font-size:16.5px;font-weight:700;letter-spacing:-0.02em;color:var(--ink);line-height:1.3;}
  .up-sub{margin:4px 0 0;font-size:13.5px;line-height:1.5;color:var(--muted);}

  /* ① 내 제품 — 가로 스크롤 칩(기기 기억) */
  .up-known{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--line-soft);}
  .up-known-label{font-size:12.5px;font-weight:650;color:var(--teal-deep);margin-bottom:8px;}
  .up-known-list{display:flex;gap:9px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch;}
  .up-known-chip{
    flex:none;display:flex;align-items:center;gap:9px;min-height:52px;
    padding:8px 13px 8px 8px;background:var(--paper);
    border:1px solid var(--line);border-radius:999px;
    font:inherit;text-align:left;cursor:pointer;
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .up-known-chip:hover{border-color:var(--teal);box-shadow:0 3px 12px -8px rgba(14,111,102,.32);}
  .up-known-thumb{
    flex:none;width:36px;height:36px;border-radius:50%;overflow:hidden;
    background:var(--surface);border:1px solid var(--line-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .up-known-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .up-known-tx{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
  .up-known-name{font-size:13px;font-weight:650;color:var(--ink);white-space:nowrap;}
  .up-known-date{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;}

  /* 찾기 방법 disclosure 3종 */
  .up-methods{display:flex;flex-direction:column;gap:8px;}
  .up-method{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;}
  .up-method.is-open{border-color:var(--teal);}
  .up-method-head{
    width:100%;display:flex;align-items:center;gap:11px;min-height:48px;
    padding:11px 14px;background:transparent;border:0;font:inherit;
    text-align:left;cursor:pointer;color:var(--ink);
  }
  .up-method-ic{
    flex:none;width:30px;height:30px;border-radius:8px;
    background:var(--teal-wash);color:var(--teal-deep);
    display:flex;align-items:center;justify-content:center;
  }
  .up-method-ic svg{width:17px;height:17px;}
  .up-method-label{flex:1;min-width:0;font-size:14.5px;font-weight:650;letter-spacing:-0.01em;}
  .up-chev{flex:none;color:var(--sil-d);transition:transform .18s var(--ease);display:flex;}
  .up-chev svg{width:16px;height:16px;display:block;}
  .up-method.is-open .up-chev{transform:rotate(180deg);color:var(--teal);}
  .up-method-body{display:none;padding:2px 14px 14px;}
  .up-method.is-open .up-method-body{display:block;}

  .up-field{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .up-field:last-of-type{margin-bottom:0;}
  .up-input{
    flex:1;min-width:120px;min-height:44px;padding:11px 14px;
    font-family:inherit;font-size:16px;color:var(--ink);
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .up-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-wash);}
  .up-go{
    flex:none;min-height:44px;padding:11px 16px;
    border:1.5px solid var(--teal);background:var(--teal);color:#fff;border-radius:var(--radius-sm);
    font:inherit;font-size:14px;font-weight:650;cursor:pointer;
    transition:background .15s var(--ease),border-color .15s var(--ease);
  }
  .up-go:hover{background:var(--teal-deep);border-color:var(--teal-deep);}
  .up-go[disabled]{opacity:.6;cursor:default;}

  /* 사진 선택(라벨로 감싼 숨김 input) */
  .up-file{
    display:inline-flex;align-items:center;gap:8px;min-height:44px;padding:11px 16px;
    border:1.5px solid var(--teal);background:var(--paper);color:var(--teal-deep);
    border-radius:var(--radius-sm);font:inherit;font-size:14px;font-weight:650;cursor:pointer;
    transition:background .15s var(--ease);
  }
  .up-file:hover{background:var(--teal-wash);}
  .up-file:focus-within{outline:2px solid var(--teal);outline-offset:2px;}
  .up-file svg{width:17px;height:17px;}
  .up-file input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}

  /* 후보 카드(전화·사진·주문 공용) */
  .up-cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-top:10px;}
  .up-cand{
    display:flex;align-items:center;gap:11px;padding:9px 11px;
    background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
    font:inherit;text-align:left;cursor:pointer;width:100%;
    transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
  }
  .up-cand:hover{border-color:var(--teal);box-shadow:0 3px 12px -8px rgba(14,111,102,.3);}
  .up-cand-thumb{
    flex:none;width:44px;height:44px;border-radius:8px;overflow:hidden;
    background:var(--surface);border:1px solid var(--line-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .up-cand-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .up-cand-meta{flex:1;min-width:0;}
  .up-cand-code{font-size:13.5px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;word-break:break-all;}
  .up-cand-name{font-size:12.5px;line-height:1.4;color:var(--muted);}
  .up-cand-sub{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px;}
  .up-cand-go{flex:none;font-size:12.5px;font-weight:650;color:var(--teal-deep);align-self:center;}

  /* 신뢰도 막대(사진 후보) */
  .up-conf{display:flex;align-items:center;gap:8px;margin-top:5px;}
  .up-conf-track{flex:1;height:5px;border-radius:999px;background:var(--sand);overflow:hidden;}
  .up-conf-fill{height:100%;border-radius:999px;background:var(--teal);}
  .up-conf-num{flex:none;font-size:11.5px;font-weight:650;color:var(--muted);font-variant-numeric:tabular-nums;}

  /* 구매정보 카드(주문 확정 — 읽기 전용) */
  .up-orderinfo{
    margin-top:10px;padding:12px 13px;background:var(--paper);
    border:1px solid var(--line);border-radius:var(--radius-sm);
  }
  .up-oi-row{display:flex;justify-content:space-between;gap:12px;padding:3px 0;}
  .up-oi-k{font-size:12.5px;color:var(--muted);flex:none;}
  .up-oi-v{font-size:13px;font-weight:600;color:var(--ink);text-align:right;word-break:break-all;}
  .up-oi-clear{
    margin-top:9px;min-height:34px;padding:6px 13px;border-radius:999px;
    border:1px solid var(--line);background:var(--paper);color:var(--muted);
    font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;
    transition:border-color .15s var(--ease),color .15s var(--ease);
  }
  .up-oi-clear:hover{border-color:var(--teal);color:var(--teal-deep);}

  /* 소프트 인라인 메시지(비차단) */
  .up-note{margin-top:9px;font-size:13px;line-height:1.5;color:var(--muted);}
  .up-note.is-retry{color:var(--teal-deep);}

  /* 안심 카피(§5-4) */
  .up-safe{
    display:flex;align-items:flex-start;gap:6px;margin-top:11px;
    font-size:12px;line-height:1.5;color:var(--muted);
  }
  .up-safe svg{flex:none;width:13px;height:13px;margin-top:2px;color:var(--sil-d);}

  @media(max-width:520px){
    .up-input{min-width:0;flex-basis:100%;}
  }

  /* 점검 카드 — index.html .as-notice.as-maint 연노랑 팔레트 재사용 */
  .as-maint-card{
    background:#FBF3E2;border:1px solid #EBDCB9;border-radius:var(--radius);
    padding:18px 20px;
  }
  .as-maint-card .amc-t{font-size:16px;font-weight:700;letter-spacing:-0.015em;color:var(--ink);}
  .as-maint-card .amc-b{margin-top:6px;color:#6F675C;font-size:14px;line-height:1.65;}

  /* 토스트 — 자동 소멸(reduced-motion은 위 전역 규칙이 애니메이션 차단) */
  .toast{
    position:fixed;left:50%;bottom:clamp(20px,5vw,34px);transform:translateX(-50%);
    z-index:60;max-width:min(92vw,420px);
    background:var(--ink);color:#fff;border-radius:12px;padding:12px 18px;
    font-size:14px;font-weight:600;line-height:1.5;text-align:center;
    box-shadow:0 10px 30px -12px rgba(35,32,27,.45);
    animation:toast-in .22s var(--ease);
  }
  @keyframes toast-in{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
</style>
